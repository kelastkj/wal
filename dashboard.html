<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru Wali - SMKN 2 Marabahan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui'] } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp 0.3s ease forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-16" style="font-family:'Plus Jakarta Sans',sans-serif">

    <header class="bg-white/95 backdrop-blur border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <a href="index.html" class="w-8 h-8 rounded-lg bg-gray-100 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center text-gray-500 transition-all">
                    <i class="fas fa-arrow-left text-xs"></i>
                </a>
                <div>
                    <h1 class="font-extrabold text-blue-700 text-base tracking-tight leading-tight">Dashboard Guru Wali</h1>
                    <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">SMKN 2 Marabahan</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="statBadge" class="hidden text-[10px] bg-blue-50 text-blue-600 font-black px-3 py-1 rounded-full border border-blue-100"></span>
                <button onclick="refreshData()" id="refreshBtn" title="Muat ulang"
                    class="w-8 h-8 rounded-lg bg-gray-100 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center text-gray-500 transition-all">
                    <i class="fas fa-sync-alt text-xs"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 space-y-4">

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="summaryCards">
            <div class="bg-white border rounded-2xl p-4 flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-100 rounded-xl flex items-center justify-center shrink-0">
                    <i class="fas fa-check-circle text-emerald-600 text-sm"></i>
                </div>
                <div>
                    <p id="cntToday" class="text-2xl font-black text-emerald-700">—</p>
                    <p class="text-[10px] text-gray-400 font-bold leading-tight">Input Hari Ini</p>
                </div>
            </div>
            <div class="bg-white border rounded-2xl p-4 flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-100 rounded-xl flex items-center justify-center shrink-0">
                    <i class="fas fa-calendar-week text-blue-600 text-sm"></i>
                </div>
                <div>
                    <p id="cntWeek" class="text-2xl font-black text-blue-700">—</p>
                    <p class="text-[10px] text-gray-400 font-bold leading-tight">Minggu Ini</p>
                </div>
            </div>
            <div class="bg-white border rounded-2xl p-4 flex items-center gap-3">
                <div class="w-9 h-9 bg-amber-100 rounded-xl flex items-center justify-center shrink-0">
                    <i class="fas fa-exclamation-circle text-amber-600 text-sm"></i>
                </div>
                <div>
                    <p id="cntLate" class="text-2xl font-black text-amber-700">—</p>
                    <p class="text-[10px] text-gray-400 font-bold leading-tight">&gt; 7 Hari Lalu</p>
                </div>
            </div>
            <div class="bg-white border rounded-2xl p-4 flex items-center gap-3">
                <div class="w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center shrink-0">
                    <i class="fas fa-minus-circle text-gray-400 text-sm"></i>
                </div>
                <div>
                    <p id="cntNever" class="text-2xl font-black text-gray-500">—</p>
                    <p class="text-[10px] text-gray-400 font-bold leading-tight">Belum Ada Data</p>
                </div>
            </div>
        </div>

        <!-- Search + Legend Bar -->
        <div class="flex items-center gap-2">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                <input type="text" id="searchInput" oninput="renderCards()" placeholder="Cari nama guru..."
                    class="w-full bg-white border rounded-xl pl-9 pr-3 py-2.5 text-sm font-bold text-gray-700 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
            </div>
            <select id="filterStatus" onchange="renderCards()"
                class="bg-white border rounded-xl px-3 py-2.5 text-xs font-bold text-gray-600 focus:border-blue-400 outline-none transition-all shrink-0">
                <option value="">Semua</option>
                <option value="today">Hari Ini</option>
                <option value="week">Minggu Ini</option>
                <option value="late">Terlambat</option>
                <option value="never">Belum Ada</option>
            </select>
        </div>

        <!-- Legend -->
        <div class="flex flex-wrap gap-2 px-1">
            <span class="flex items-center gap-1.5 text-[10px] text-gray-500">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shrink-0"></span>Hari ini
            </span>
            <span class="flex items-center gap-1.5 text-[10px] text-gray-500">
                <span class="w-2.5 h-2.5 rounded-full bg-blue-500 shrink-0"></span>1–7 hari lalu
            </span>
            <span class="flex items-center gap-1.5 text-[10px] text-gray-500">
                <span class="w-2.5 h-2.5 rounded-full bg-amber-500 shrink-0"></span>&gt;7 hari lalu
            </span>
            <span class="flex items-center gap-1.5 text-[10px] text-gray-500">
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300 shrink-0"></span>Belum ada data
            </span>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-16 text-center">
            <i class="fas fa-spinner fa-spin text-blue-400 text-3xl mb-3"></i>
            <p class="text-sm text-gray-400 font-bold">Memuat data...</p>
        </div>

        <!-- Cards Grid -->
        <div id="cardGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>

        <!-- No results -->
        <div id="noResult" class="hidden flex flex-col items-center justify-center py-12 text-center">
            <i class="fas fa-search text-gray-200 text-4xl mb-3"></i>
            <p class="text-sm font-black text-gray-300">Tidak ditemukan</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxmLhmcE4di_21eVPAUVQ7M8f0f_cbpJHDGY-2nEE-SbJgnEHA6uMgS-tW5e-QFMIdH/exec';

        let guruData = {};      // dari data_siswa.json
        let lastEntry = {};     // guru → tanggal terakhir (string YYYY-MM-DD)
        let todayStr = '';

        const HARI_ID  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
        const BULAN_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

        function getToday() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function formatDate(str) {
            if (!str) return null;
            const d = new Date(str + 'T00:00:00');
            return `${HARI_ID[d.getDay()]}, ${d.getDate()} ${BULAN_ID[d.getMonth()]} ${d.getFullYear()}`;
        }

        function diffDays(dateStr) {
            const d1 = new Date(todayStr + 'T00:00:00');
            const d2 = new Date(dateStr  + 'T00:00:00');
            return Math.round((d1 - d2) / 86400000);
        }

        function getStatus(dateStr) {
            if (!dateStr) return 'never';
            const diff = diffDays(dateStr);
            if (diff === 0) return 'today';
            if (diff <= 7) return 'week';
            return 'late';
        }

        function statusStyle(status) {
            return {
                today: { dot: 'bg-emerald-500', badge: 'bg-emerald-50 text-emerald-700 border-emerald-200', label: 'Hari Ini', border: 'border-emerald-200' },
                week:  { dot: 'bg-blue-500',    badge: 'bg-blue-50 text-blue-700 border-blue-200',         label: null,       border: 'border-blue-100' },
                late:  { dot: 'bg-amber-500',   badge: 'bg-amber-50 text-amber-700 border-amber-200',      label: null,       border: 'border-amber-100' },
                never: { dot: 'bg-gray-300',    badge: 'bg-gray-100 text-gray-500 border-gray-200',        label: 'Belum Ada Data', border: 'border-gray-200' },
            }[status];
        }

        async function loadData() {
            todayStr = getToday();
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('cardGrid').classList.add('hidden');
            document.getElementById('noResult').classList.add('hidden');

            // Ambil daftar guru dari lokal
            try {
                const r = await fetch('data_siswa.json');
                guruData = await r.json();
            } catch(e) {
                document.getElementById('loadingState').innerHTML =
                    `<i class="fas fa-exclamation-circle text-red-400 text-3xl mb-3"></i><p class="text-sm text-red-400 font-bold">Gagal memuat data_siswa.json</p>`;
                return;
            }

            // Ambil data 30 hari terakhir dari API (tanpa filter guru → semua)
            const fromDate = new Date();
            fromDate.setDate(fromDate.getDate() - 30);
            const fromStr = `${fromDate.getFullYear()}-${String(fromDate.getMonth()+1).padStart(2,'0')}-${String(fromDate.getDate()).padStart(2,'0')}`;

            try {
                const res = await fetch(`${API_URL}?action=getReport&from=${fromStr}&to=${todayStr}`);
                const json = await res.json();
                if (json.status === 'success' && Array.isArray(json.data)) {
                    // Temukan tanggal terakhir per guru
                    json.data.forEach(rec => {
                        const g = rec.guru;
                        const t = rec.tanggal;
                        if (!g || !t) return;
                        if (!lastEntry[g] || t > lastEntry[g]) lastEntry[g] = t;
                    });
                }
            } catch(e) {
                // API gagal → tetap tampilkan kartu tanpa info tanggal
            }

            document.getElementById('loadingState').classList.add('hidden');
            updateSummary();
            renderCards();

            const total = Object.keys(guruData).length;
            document.getElementById('statBadge').textContent = `${total} Guru`;
            document.getElementById('statBadge').classList.remove('hidden');
        }

        function updateSummary() {
            const gurus = Object.keys(guruData);
            let today = 0, week = 0, late = 0, never = 0;
            gurus.forEach(g => {
                const s = getStatus(lastEntry[g]);
                if (s === 'today') today++;
                else if (s === 'week') week++;
                else if (s === 'late') late++;
                else never++;
            });
            document.getElementById('cntToday').textContent = today;
            document.getElementById('cntWeek').textContent  = week;
            document.getElementById('cntLate').textContent  = late;
            document.getElementById('cntNever').textContent = never;
        }

        function renderCards() {
            const q      = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterStatus').value;
            const grid   = document.getElementById('cardGrid');

            const gurus = Object.keys(guruData).sort((a, b) => {
                const hasA = lastEntry[a] ? 1 : 0;
                const hasB = lastEntry[b] ? 1 : 0;
                if (hasB !== hasA) return hasB - hasA; // ada data dulu
                return a.localeCompare(b, 'id');
            });
            let visible  = 0;
            let html = '';

            gurus.forEach((guru, i) => {
                const data   = guruData[guru];
                const lastD  = lastEntry[guru] || null;
                const status = getStatus(lastD);

                if (q && !guru.toLowerCase().includes(q)) return;
                if (filter && status !== filter) return;

                visible++;
                const st    = statusStyle(status);
                const diff  = lastD ? diffDays(lastD) : null;
                const kelasSet = [...new Set(data.siswa.map(s => s.kelas))];

                let timeLabel = '';
                if (status === 'today')       timeLabel = 'Hari ini';
                else if (diff === 1)          timeLabel = 'Kemarin';
                else if (diff !== null)       timeLabel = `${diff} hari lalu`;
                else                          timeLabel = 'Belum ada data';

                const laporan_url = `laporan.html?guru=${encodeURIComponent(guru)}`;

                html += `
                <a href="${laporan_url}" class="fade-up block bg-white border ${st.border} rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-blue-300 active:scale-[0.98] transition-all group"
                   style="animation-delay:${Math.min(i,30)*20}ms">
                    <div class="flex items-start justify-between gap-2 mb-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="w-2 h-2 rounded-full ${st.dot} shrink-0"></span>
                                <p class="font-black text-[11px] text-gray-800 group-hover:text-blue-700 transition-colors truncate uppercase">${guru}</p>
                            </div>
                            <div class="flex flex-wrap gap-1 pl-4">
                                ${kelasSet.map(k => `<span class="text-[7px] bg-blue-50 text-blue-600 border border-blue-100 px-1.5 py-0.5 rounded-full font-black">${k}</span>`).join('')}
                            </div>
                        </div>
                        <div class="shrink-0 text-right">
                            <span class="text-[9px] font-black text-gray-400">${data.siswa.length}</span>
                            <span class="block text-[8px] text-gray-300 font-normal">siswa</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-2.5 border-t border-gray-50">
                        <div class="flex items-center gap-1.5">
                            <i class="fas fa-clock text-[9px] text-gray-300"></i>
                            <span class="text-[10px] text-gray-500 font-bold">${timeLabel}</span>
                        </div>
                        ${lastD ? `<span class="text-[9px] font-black px-2 py-0.5 rounded-full border ${st.badge}">${lastD}</span>` : ''}
                        <i class="fas fa-chevron-right text-[9px] text-gray-300 group-hover:text-blue-400 transition-colors ml-auto"></i>
                    </div>
                </a>`;
            });

            grid.innerHTML = html || '';
            grid.classList.toggle('hidden', visible === 0);
            document.getElementById('noResult').classList.toggle('hidden', visible > 0);
        }

        function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.querySelector('i').classList.add('fa-spin');
            lastEntry = {};
            loadData().finally(() => {
                setTimeout(() => btn.querySelector('i').classList.remove('fa-spin'), 600);
            });
        }

        loadData();
    </script>
</body>
</html>
